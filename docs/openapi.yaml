openapi: 3.0.3
info:
  title: ROM Cleanup API
  version: 1.0.0
  description: |
    Lokale REST-API für ROM Cleanup (ASP.NET Core Minimal API, localhost-only).
    Authentifizierung via X-Api-Key Header (Wert aus ROM_CLEANUP_API_KEY Env-Variable).
    Rate-Limiting: 120 Requests/Minute (Sliding Window).
servers:
  - url: http://127.0.0.1:7878
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Health-Status
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  serverRunning:
                    type: boolean
                  activeRunId:
                    type: string
                    nullable: true
                  utc:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
  /openapi:
    get:
      summary: OpenAPI-Spezifikation (JSON)
      responses:
        '200':
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
  /runs:
    post:
      summary: Startet einen Lauf
      parameters:
        - in: query
          name: wait
          schema:
            type: boolean
          description: Wenn true, blockiert bis Lauf fertig.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '200':
          description: Lauf fertig (wait=true)
        '202':
          description: Lauf gestartet
        '400':
          description: Ungültige Payload
        '401':
          description: Unauthorized
        '409':
          description: Lauf bereits aktiv
        '429':
          description: Too many requests
  /runs/{runId}:
    get:
      summary: Laufstatus
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Laufstatus
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/RunRecord'
        '401':
          description: Unauthorized
        '404':
          description: Run not found
        '429':
          description: Too many requests
  /runs/{runId}/result:
    get:
      summary: Laufergebnis
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run-Resultat
          content:
            application/json:
              schema:
                type: object
                properties:
                  run:
                    $ref: '#/components/schemas/RunRecord'
                  result:
                    $ref: '#/components/schemas/RunResult'
        '401':
          description: Unauthorized
        '404':
          description: Run not found
        '409':
          description: Run still running
        '429':
          description: Too many requests
  /runs/{runId}/cancel:
    post:
      summary: Lauf abbrechen
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Abgebrochen
        '401':
          description: Unauthorized
        '404':
          description: Run not found
        '409':
          description: Run not running
        '429':
          description: Too many requests
  /runs/{runId}/stream:
    get:
      summary: SSE-Fortschrittsstream
      description: |
        Server-Sent Events Stream. Sendet Events: ready, status, completed, error, timeout.
        Timeout nach 300 Sekunden.
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE Stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Unauthorized
        '404':
          description: Run not found
        '429':
          description: Too many requests
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
  schemas:
    CreateRunRequest:
      type: object
      required: [roots]
      properties:
        roots:
          type: array
          items:
            type: string
          description: ROM-Verzeichnispfade (mindestens 1, keine Systemverzeichnisse, keine Laufwerks-Roots)
        mode:
          type: string
          enum: [DryRun, Move]
          default: DryRun
        preferRegions:
          type: array
          items:
            type: string
          description: Bevorzugte Regionen (z.B. ["EU", "US", "JP"])
          default: ["EU", "US", "WORLD", "JP"]
    RunRecord:
      type: object
      properties:
        runId:
          type: string
        status:
          type: string
          enum: [running, completed, failed, cancelled]
        mode:
          type: string
          enum: [DryRun, Move]
        roots:
          type: array
          items:
            type: string
        preferRegions:
          type: array
          items:
            type: string
        startedUtc:
          type: string
          format: date-time
        completedUtc:
          type: string
          format: date-time
          nullable: true
        progressMessage:
          type: string
          nullable: true
        result:
          $ref: '#/components/schemas/RunResult'
          nullable: true
    RunResult:
      type: object
      properties:
        status:
          type: string
        exitCode:
          type: integer
          description: "0=Erfolg, 1=Fehler, 2=Abgebrochen, 3=Preflight fehlgeschlagen"
        totalFiles:
          type: integer
        groups:
          type: integer
        keep:
          type: integer
        move:
          type: integer
        durationMs:
          type: integer
          format: int64
        error:
          type: string
          nullable: true
