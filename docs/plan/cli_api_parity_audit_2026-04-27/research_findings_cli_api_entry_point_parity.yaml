patterns_found:
  - category: architecture
    pattern: shared-orchestration-stack
    description: |
      Alle drei Entry Points materialisieren RunOptions ueber denselben Pfad:
      RunConfigurationMaterializer -> RunOptionsFactory.Create -> RunOptionsBuilder.Normalize/Validate.
      Defaults (Mode=DryRun, ConflictPolicy, PreferRegions, HashType, Extensions) sind damit
      zentralisiert und kollidieren nicht.
    examples:
      - file: src/Romulus.CLI/CliOptionsMapper.cs
        location: src/Romulus.CLI/CliOptionsMapper.cs:71
        snippet: var materialized = await materializer.MaterializeAsync(CreateDraft(cli), CreateExplicitness(cli), settings, ...);
      - file: src/Romulus.Api/ApiRunConfigurationMapper.cs
        location: src/Romulus.Api/ApiRunConfigurationMapper.cs:74
        snippet: "var materialized = await materializer.MaterializeAsync(draft, explicitness, settings, ct: ct);"
      - file: src/Romulus.UI.Wpf/ViewModels/MainViewModel.Productization.cs
        location: src/Romulus.UI.Wpf/ViewModels/MainViewModel.Productization.cs:241
        snippet: BuildCurrentRunConfigurationExplicitness ... _runConfigurationMaterializer
    prevalence: common

  - category: structure
    pattern: three-explicitness-mechanisms
    description: |
      Trotz gemeinsamer RunOptionsFactory existieren drei voellig unterschiedliche
      Explicitness-Quellen: CLI (per-Property *Explicit Booleans, gesetzt im Parser),
      API (JsonElement Property-Presence-Walk), WPF (Diff gegen Selection-Baseline-Draft).
      Funktional aequivalent, strukturell drei Wahrheiten -> Test-Last vervielfacht sich.
    examples:
      - file: src/Romulus.CLI/CliRunOptions.cs (referenziert)
        location: src/Romulus.CLI/CliOptionsMapper.cs:131
        snippet: ModeExplicit, PreferRegionsExplicit, ExtensionsExplicit, RemoveJunkExplicit, ...
      - file: src/Romulus.Api/ApiRunConfigurationMapper.cs
        location: src/Romulus.Api/ApiRunConfigurationMapper.cs:103
        snippet: CollectPropertyNames(rootElement) -> BuildPresence
      - file: src/Romulus.UI.Wpf/ViewModels/MainViewModel.Productization.cs
        location: src/Romulus.UI.Wpf/ViewModels/MainViewModel.Productization.cs:241
        snippet: "!AreEquivalent(currentDraft.Mode, baselineDraft.Mode), ..."
    prevalence: common

  - category: api_output
    pattern: divergent-output-naming
    description: |
      ApiRunResult.OrchestratorStatus vs CliDryRunOutput.Status sind dieselbe fachliche
      Information (RunProjection.Status), tragen aber unterschiedliche Feldnamen.
      Ein API-Konsument und ein CLI-Konsument muessen unterschiedlichen Schluessel
      lesen, um den gleichen Status zu erhalten.
    examples:
      - file: src/Romulus.Api/RunManager.cs
        location: src/Romulus.Api/RunManager.cs:498
        snippet: public string OrchestratorStatus { get; init; } = "";
      - file: src/Romulus.CLI/CliOutputWriter.cs
        location: src/Romulus.CLI/CliOutputWriter.cs:265
        snippet: public string Status { get; init; } = "";
    prevalence: rare

  - category: api_output
    pattern: dedupe-group-shape-divergence
    description: |
      CLI exportiert flache DedupeGroups (paths + 5 enum-Strings pro Winner/Loser);
      API exportiert komplette RomCandidate-Objekte. API-Form transportiert deutlich
      mehr internes Shape (z. B. Hash, ArchiveEntry, ConsoleKey, Reason etc.).
    examples:
      - file: src/Romulus.CLI/CliOutputWriter.cs
        location: src/Romulus.CLI/CliOutputWriter.cs:88
        snippet: |
          new CliDedupeGroup { GameKey=..., Winner=r.Winner.MainPath, WinnerDatMatch=..., WinnerDecisionClass=..., Losers=r.Losers.Select(l => l.MainPath).ToArray(), ... }
      - file: src/Romulus.Api/RunManager.cs
        location: src/Romulus.Api/RunManager.cs:718
        snippet: |
          public sealed class ApiDedupeGroup { public string GameKey; public RomCandidate Winner; public RomCandidate[] Losers; }
    prevalence: rare

  - category: api_output
    pattern: missing-fields-in-api-result
    description: |
      ApiRunResult enthaelt weder Mode, SchemaVersion noch Keep (CLI hat alle drei).
      - Mode fehlt: Konsument muss aus ggf. begleitendem RunStatusDto.Mode ableiten.
      - SchemaVersion fehlt: kein Versionsindikator fuer Kompatibilitaetspruefung.
      - Keep (Synonym fuer Winners) fehlt: CLI exponiert sowohl Keep als auch Winners (Duplikat),
        API nur Winners. Brueche bei API-Konsumenten, die das CLI-JSON kennen.
    examples:
      - file: src/Romulus.Api/RunManager.cs
        location: src/Romulus.Api/RunManager.cs:495
        snippet: public sealed class ApiRunResult { public string OrchestratorStatus; public int ExitCode; public int TotalFiles; ... // kein Mode/SchemaVersion/Keep
      - file: src/Romulus.CLI/CliOutputWriter.cs
        location: src/Romulus.CLI/CliOutputWriter.cs:255
        snippet: public string SchemaVersion = RunConstants.CliOutputSchemaVersion; public string Mode = "DryRun"; public int Keep; public int Winners;
    prevalence: rare

  - category: documentation
    pattern: cli-help-exit-code-incomplete
    description: |
      Source-Header in src/Romulus.CLI/Program.cs:35 dokumentiert Exit Codes 0..4
      ("4=Completed with errors"). Die User-visible WriteUsage-Hilfe (CliOutputWriter.cs:209ff)
      listet nur 0..3. Exit Code 4 wird tatsaechlich von der Runtime ueber projection.ExitCode
      emittiert (RunProjection wird in den Mapper geschoben).
    examples:
      - file: src/Romulus.CLI/Program.cs
        location: src/Romulus.CLI/Program.cs:35
        snippet: "Exit codes: 0=Success, 1=Error, 2=Cancelled, 3=Preflight failed, 4=Completed with errors."
      - file: src/Romulus.CLI/CliOutputWriter.cs
        location: src/Romulus.CLI/CliOutputWriter.cs:209
        snippet: "Exit codes:\n  0  Success\n  1  Runtime error\n  2  Cancelled\n  3  Preflight / validation failure"
    prevalence: rare

  - category: settings
    pattern: api-uses-appdata-settings
    description: |
      RunEnvironmentBuilder hat zwei LoadSettings-Overloads. Der TASK-161-Override-Pfad
      (LoadSettings(dataDir, settingsOverridePath)) ist explizit fuer die API gedacht
      ("decouple from per-user %APPDATA% settings on server deployments").
      Die API ruft jedoch in 7 Callsites die override-lose Variante auf.
      HeadlessApiOptions exponiert keinen SettingsPath-Slot, der den Override speisen koennte.
      Damit ist die Decoupling-Mechanik totes Code-Asset im API-Pfad.
    examples:
      - file: src/Romulus.Api/Program.cs
        location: src/Romulus.Api/Program.cs:49
        snippet: var settings = RunEnvironmentBuilder.LoadSettings(dataDir);
      - file: src/Romulus.Api/ProgramHelpers.cs
        location: src/Romulus.Api/ProgramHelpers.cs:492
        snippet: var settings = RunEnvironmentBuilder.LoadSettings(dataDir);
      - file: src/Romulus.Api/Program.RunWatchEndpoints.cs
        location: src/Romulus.Api/Program.RunWatchEndpoints.cs:199
        snippet: var settings = RunEnvironmentBuilder.LoadSettings(dataDir);
      - file: src/Romulus.Api/DashboardDataBuilder.cs
        location: src/Romulus.Api/DashboardDataBuilder.cs:88
        snippet: var settings = RunEnvironmentBuilder.LoadSettings(dataDir);
    prevalence: common

  - category: safety
    pattern: divergent-danger-action-gate
    description: |
      Drei verschiedene Bestaetigungsmechanismen fuer Mode=Move:
      - WPF: getipptes Token "MOVE" via DangerConfirmDialog (Repository-Memory bestaetigt).
      - CLI: --yes flag oder interaktive y/N-Antwort. NonInteractive ohne --yes -> Exit 3.
      - API: keinerlei Bestaetigungs-Token. Nur API-Key (Authentifizierung) und
        AllowedRootPathPolicy (Pfad-Containment). POST /run mit mode=Move proceedet sofort.
      Ein leakender API-Key bewirkt destruktive Aktion ohne weiteres Gate.
    examples:
      - file: src/Romulus.CLI/Program.cs
        location: src/Romulus.CLI/Program.cs:170
        snippet: |
          if (string.Equals(cliOpts.Mode, RunConstants.ModeMove, ...) && !cliOpts.Yes) { ... interactive y/N prompt ... }
      - file: src/Romulus.Api/Program.RunWatchEndpoints.cs
        location: src/Romulus.Api/Program.RunWatchEndpoints.cs:242
        snippet: |
          if (!mode.Equals("DryRun", ...) && !mode.Equals("Move", ...)) return ApiError(400, ...); // kein Token-Gate
      - file: src/Romulus.UI.Wpf (Repo-Memory)
        location: src/Romulus.UI.Wpf/ViewModels/MainViewModel.cs OnConvertOnlyRequested / OnStartMove
        snippet: _dialog.DangerConfirm(... ConfirmText="MOVE" ...);
    prevalence: rare

  - category: api_dto
    pattern: hardcoded-defaults-in-dto
    description: |
      RunStatusDto.HashType = "SHA1" und RunStatusDto.Mode = "DryRun" sind als
      String-Literale im DTO hardgecodet, nicht aus RunConstants.DefaultHashType /
      RunConstants.ModeDryRun bezogen. Falls RunConstants jemals abweicht,
      drift sind die API-Status-Defaults zu den fachlichen Defaults.
    examples:
      - file: src/Romulus.Api/RunManager.cs
        location: src/Romulus.Api/RunManager.cs:643
        snippet: public string HashType { get; init; } = "SHA1";
      - file: src/Romulus.Api/RunManager.cs
        location: src/Romulus.Api/RunManager.cs:627
        snippet: public string Mode { get; init; } = "DryRun";
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: RunConfigurationMaterializer
      responsibility: Profile/Workflow-Overlays + RunOptionsFactory-Aufruf, gemeinsamer Pfad fuer alle drei Entry Points.
      location: src/Romulus.Infrastructure/Profiles/RunConfigurationMaterializer.cs
      relationship_to_domain: Single Source of Truth fuer Materialization, von CLI/API/WPF konsumiert.
    - component: RunOptionsBuilder
      responsibility: Normalize/Validate/DryRunWarnings.
      location: src/Romulus.Infrastructure/Orchestration/RunOptionsBuilder.cs
      relationship_to_domain: zentral, korrekt verdrahtet ueber RunOptionsFactory.
    - component: RunOrchestrator
      responsibility: Pipeline-Ausfuehrung; injiziert DryRunFeatureWarnings in RunResult.Preflight.Warnings (Zeile 139).
      location: src/Romulus.Infrastructure/Orchestration/RunOrchestrator.cs
      relationship_to_domain: Warnings landen ueber RunResult einheitlich in CLI- und API-Output.
    - component: RunProjection / RunArtifactProjection
      responsibility: Projection-Schicht fuer KPI-Counter, Dedup-Gruppen, Conversion-Plans.
      location: src/Romulus.Infrastructure/Orchestration/RunProjection.cs
      relationship_to_domain: ApiRunResultMapper und CliOutputWriter konsumieren diese Projection und exportieren strukturell aehnlich, aber mit Feldnamen-Drift.
  interfaces_used_by_domain:
    - interface: IRunOptionsSource
      location: src/Romulus.Infrastructure/Orchestration/RunOptionsFactory.cs:5
      usage_pattern: Eingangs-Vertrag fuer RunOptionsFactory.Create. Wird heute primaer ueber RunConfigurationMaterializer umgangen (Materializer baut RunOptions direkt).
  data_flow_involving_domain: |
    Args/HTTP-Body/UI-Inputs -> Draft+Explicitness ->
    RunConfigurationMaterializer (Profile/Workflow Overlay) ->
    RunOptionsFactory.Create (Normalize+Validate) ->
    RunOrchestrator (mit DryRunFeatureWarnings im RunResult.Preflight.Warnings) ->
    RunResult -> RunProjection ->
    ApiRunResultMapper.Map / CliOutputWriter.FormatDryRunJson / WPF DashboardProjection
  key_relationships_to_domain:
    - from: RunRequest (API)
      to: RunOptions
      relationship: ApiRunConfigurationMapper.ResolveAsync via Materializer
    - from: CliRunOptions (CLI)
      to: RunOptions
      relationship: CliOptionsMapper.MapAsync via Materializer
    - from: RunConfigurationDraft (WPF)
      to: RunOptions
      relationship: BuildCurrentRunConfigurationDraft + Materializer

related_technology_stack:
  languages_used_in_domain: [C#]
  frameworks_used_in_domain:
    - name: ASP.NET Core Minimal API
      usage_in_domain: Romulus.Api Endpoints (POST /run, GET /run/{id}/result, /watch, ...).
    - name: System.CommandLine-aehnlich (eigener CliArgsParser)
      usage_in_domain: Romulus.CLI - eigener Parser, kein NuGet-Paket.
  libraries_used_in_domain:
    - name: System.Text.Json + Source-Generated Context
      purpose_in_domain: ApiJsonSerializerContext (API) und CliJsonSerializerContext (CLI). Kein gemeinsamer Context.

related_conventions:
  naming_patterns_in_domain: |
    API-DTOs Prefix "Api*" (ApiRunResult, ApiDedupeGroup, ApiPhaseMetric).
    CLI-DTOs Prefix "Cli*" (CliDryRunOutput, CliDedupeGroup, CliConversionPlan).
    OrchestratorStatus statt Status nur in API; in CLI heisst dasselbe Feld Status.
  structure_of_domain: |
    Pro Entry Point eigener Mapper und eigenes DTO-Namespace, gemeinsame Materialization
    ueber Romulus.Infrastructure.Profiles + Orchestration.
  error_handling_in_domain: |
    CLI: Exit-Codes 0/1/2/3/4 + ErrorClassifier-Logmessages.
    API: ApiError-Helpers mit standardisierten ApiErrorCodes + HTTP-Statuscodes.
    WPF: ErrorClassifier-Klassifikation in Log + Banner.

related_dependencies:
  internal:
    - component: RunOptionsBuilder
      relationship_to_domain: alle Mappers delegieren ueber RunOptionsFactory.
      direction: outbound
    - component: SettingsLoader
      relationship_to_domain: alle Entry Points laden Settings via RunEnvironmentBuilder.
      direction: outbound
    - component: RunProjection
      relationship_to_domain: gemeinsame KPI-Quelle.
      direction: outbound

domain_security_considerations:
  sensitive_areas:
    - area: Move-Mode Danger-Action Gate
      location: src/Romulus.Api/Program.RunWatchEndpoints.cs:242
      concern: |
        API hat keinen typed-Token-Gate. Bei API-Key-Leak ist destruktive Move-Operation
        ohne weiteres Gate moeglich (nur AllowedRootPathPolicy schuetzt Pfade). GUI/CLI haben
        zusaetzliche Layer (typed "MOVE" / --yes / interaktives y).
    - area: Settings-Bleed via %APPDATA% im API
      location: src/Romulus.Api/Program.cs:49 (+ 6 weitere Stellen)
      concern: |
        Auf Mehrnutzer-/Server-Maschinen werden User-Settings des unter dem die API laeuft
        in Run-Konfigurationen, Tool-Pfade, Dat-Pfade, Trash-Roots eingelesen.
        TASK-161-Decoupling existiert in der Infrastruktur, ist aber nie verdrahtet.
  authentication_patterns_in_domain: |
    API: X-Api-Key Header, Fixed-Time-Compare, Rate-Limit Bucket via SanitizeClientBindingId.
    CLI/WPF: Lokaler Process-Context, keine Authentifizierung.
  authorization_patterns_in_domain: |
    API: AllowedRootPathPolicy + ValidatePathSecurity pro Pfad-Argument.
    CLI/WPF: Path-Safety in FileSystemAdapter (root containment, reparse-point checks).
  data_validation_in_domain: |
    Gemeinsam: RunOptionsBuilder.Validate (Path-Validation, OnlyGames-Guard, Output-outside-Roots).
    API zusaetzlich: HTTP-Body-Limit 1 MB (Kestrel), JSON-Schema implizit ueber Source-Generated Context.

testing_patterns:
  framework: xunit
  coverage_areas:
    - Phase5CEntryPointParityTests (CLI/API/WPF Defaults, TASK-161 LoadSettings, GetDryRunFeatureWarnings)
    - RunOptionsBuilderCoverageTests (Normalize/Validate/DryRunWarnings)
    - RunEnvironmentBuilderCoverageBoostTests (LoadSettings overloads, BuildConsoleMap)
  test_organization: Tests pro Logik-Bereich, Phase5C explizit fuer Entry-Point-Parity.
  mock_patterns:
    - Inline-Stubs (z. B. HeadlessApiOptions mit synthetischen AllowedRoots)
    - SettingsLoader mit Temp-Datei-Override

open_questions:
  - question: |
      Ist OrchestratorStatus (API) bewusst von Status (CLI) getrennt benannt
      ("Distinct from RunRecord.Status which tracks lifecycle"), oder ist das ein
      Drift-Findings, das geloest werden soll? Der API-Doc-Kommentar (RunManager.cs:497)
      legt Absicht nahe, aber CLI exportiert dieselbe Information unter "Status".
    context: |
      In CLI mappt FormatDryRunJson projection.Status -> Status; in API mappt der
      Mapper projection.Status -> OrchestratorStatus. Konsumenten muessen zwei
      Schluessel kennen.
    type: decision_blocker
    affects: [api-output-shape, cli-output-shape]

  - question: |
      Soll die API analog zur GUI ein typed Confirm-Token (z. B. Header
      X-Confirm-Token: MOVE) verlangen oder ist API-Key + AllowedRoots als
      Threat-Modell ausreichend?
    context: |
      Aktuell ist API der einzige Entry Point ohne Danger-Token. Beim Audit fiel
      auf, dass die fachliche Wahrheit ueber Bestaetigung in drei Auspraegungen lebt.
    type: decision_blocker
    affects: [api-move-flow, api-security-contract]

  - question: |
      Soll HeadlessApiOptions einen SettingsPath-Slot bekommen und alle 7
      LoadSettings(dataDir)-Callsites in der API auf
      LoadSettings(dataDir, headlessOptions.SettingsPath) umgestellt werden?
    context: |
      TASK-161 hat die Decoupling-API geliefert; sie ist aber nicht angeschlossen.
      Risiko auf Server-Deployments: Tool-Pfade, DatRoot, TrashRoot eines beliebigen
      Users beeinflussen API-Runs.
    type: decision_blocker
    affects: [api-settings-loading, multi-user-deployment]

  - question: |
      Soll ApiRunResult Mode/SchemaVersion/Keep aufnehmen, um vollstaendige
      Feldparitaet mit CliDryRunOutput herzustellen? Oder soll umgekehrt CLI
      OrchestratorStatus angleichen und Keep deprezieren?
    context: |
      Aktuelle Asymmetrie: CLI hat SchemaVersion+Mode+Keep, API hat sie nicht;
      umgekehrt API exportiert Phase-Metriken-Status, CLI fasst es weniger detailliert.
    type: decision_blocker
    affects: [api-output-shape, cli-output-shape, schema-versioning]

gaps:
  - area: tests
    description: |
      Phase5CEntryPointParityTests prueft Defaults und LoadSettings-Override, aber
      keine Output-Schema-Paritaet zwischen ApiRunResult und CliDryRunOutput
      (Feldnamen, Feldzaehler, DedupeGroup-Shape). Es existiert kein Test, der
      sicherstellt, dass alle RunProjection-Felder in beiden Outputs landen.
    impact: research_blocker
    affects: [output-parity-regression]

  - area: tests
    description: |
      Kein Test prueft, dass Mode=Move ueber API ohne typed-Token erlaubt ist
      (oder eben nicht). Aktueller Zustand ist nur durch Code-Lese ablesbar.
    impact: research_blocker
    affects: [api-move-confirmation-contract]

  - area: tests
    description: |
      Kein Test bindet HeadlessApiOptions.SettingsPath an
      LoadSettings(dataDir, override). Konsequenz: Drift bei Hinzufuegen weiterer
      LoadSettings(dataDir)-Callsites bleibt unbemerkt.
    impact: nice_to_know
    affects: [api-settings-isolation]

  - area: documentation
    description: |
      CliOutputWriter.WriteUsage Exit-Codes-Block nennt Code 4 nicht; Source-Header
      tut es. User-Hilfe und Source-Dokumentation widersprechen sich.
    impact: nice_to_know
    affects: [cli-help-completeness]
