        type: function
        location: src/Romulus.Infrastructure/Orchestration/RunOptionsBuilder.cs:80
        description: |
          Normalisiert Roots, Extensions (lower, dedup, OrdinalIgnoreCase), PreferRegions
          (trim, upper, dedup, fallback RunConstants.DefaultPreferRegions), Mode (case-insensitive,
          default DryRun, nur DryRun/Move zulaessig), ConflictPolicy (default RunConstants.DefaultConflictPolicy).
      - element: Validate
        type: function
        location: src/Romulus.Infrastructure/Orchestration/RunOptionsBuilder.cs:18
        description: |
          OnlyGames-Guard, optionale safe-path-Validierung fuer DatRoot/TrashRoot/AuditPath/ReportPath,
          plus ValidateOutputOutsideRoots (verhindert Output innerhalb der Scan-Roots).
      - element: GetDryRunFeatureWarnings
        type: function
