plan_id: cli_api_parity_audit_2026-04-27
objective: |
  Deep-Dive Audit fuer CLI / API / Entry-Point Parity in Romulus.
  Identifikation von Divergenzen in Defaults, Normalisierung, Validierung,
  Output-Schemas, Exit-Codes, Settings-Loading und Danger-Action-Gates
  zwischen Romulus.CLI, Romulus.Api und Romulus.UI.Wpf.
focus_area: cli_api_entry_point_parity
created_at: "2026-04-27T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Drei Entry Points gehen ueber gemeinsamen Stack RunConfigurationMaterializer -> RunOptionsFactory -> RunOptionsBuilder.Normalize/Validate (RunOptions ist Single Source of Truth).
  - Drei Schattenpfade fuer Explicitness: CLI per-Property *Explicit Flags, API JSON-Property-Presence, WPF Baseline-Diff. Funktional aequivalent, strukturell drei Wahrheiten.
  - ApiRunResult und CliDryRunOutput sind nahezu strukturgleich, divergieren aber in Feldnamen (OrchestratorStatus vs Status), fehlenden Feldern (ApiRunResult: kein Mode, kein SchemaVersion, kein Keep) und in DedupeGroup-Schema (CLI: pfad+5 enums; API: full RomCandidate).
  - CLI-Exit-Code-Help dokumentiert nur 0/1/2/3, der Source-Header und die Implementierung kennen 4 (CompletedWithErrors) -> User-Hilfe ist unvollstaendig.
  - API laedt %APPDATA%\Romulus\settings.json an 7 Stellen ueber LoadSettings(dataDir) ohne Override-Pfad; das per TASK-161 eingefuehrte Decoupling (LoadSettings(dataDir, settingsOverridePath)) wird vom API-Code nie verwendet, HeadlessApiOptions hat keine SettingsPath-Property.
  - Danger-Action-Gate fuer Mode=Move ist nicht parity: GUI=getipptes Token "MOVE", CLI=--yes oder interaktives "y", API=keinerlei Token-/Bestaetigungsgate (nur API-Key + Path-Policy).

research_metadata:
  methodology: |
    Hybrid retrieval: search_subagent (Mapping/Discovery), grep_search (exact matches),
    read_file (fokussierte Lesungen). Cross-Referenz zwischen
    RunOptionsBuilder, RunOptionsFactory, RunEnvironmentBuilder, ApiRunConfigurationMapper,
    ApiRunResultMapper, CliOptionsMapper, CliOutputWriter, CliRunOptions, RunRequest,
    HeadlessApiOptions und MainViewModel.Productization. Zwei Discovery-Passes,
    Verifikation per gezielter Code-Lese.
  scope: Drei Entry Points (CLI/API/WPF) und shared Orchestration-Layer; Tests Phase5CEntryPointParityTests, RunOptionsBuilderCoverageTests.
  confidence: high
  coverage: 75
  decision_blockers: 0
  research_blockers: 0

files_analyzed:
