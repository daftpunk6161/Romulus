name: test-pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/test-pipeline.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'data/**'
      - '.github/workflows/test-pipeline.yml'

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/RomCleanup.sln

      - name: Build
        run: dotnet build src/RomCleanup.sln --no-restore --configuration Release

      - name: Unit + Coverage Gate
        run: dotnet test src/RomCleanup.sln --no-build --configuration Release --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            src/RomCleanup.Tests/TestResults/**/*.trx
            src/RomCleanup.Tests/TestResults/**/coverage.cobertura.xml

  governance:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build (warnings as errors)
        run: dotnet build src/RomCleanup.sln --configuration Release /p:TreatWarningsAsErrors=true

      - name: Verify dependency direction
        shell: pwsh
        run: |
          # Core darf nicht Infrastructure oder Entry Points referenzieren
          $coreProj = Get-Content src/RomCleanup.Core/RomCleanup.Core.csproj -Raw
          if ($coreProj -match 'RomCleanup\.Infrastructure|RomCleanup\.CLI|RomCleanup\.Api|RomCleanup\.UI\.Wpf') {
            throw 'Core project must not reference Infrastructure or Entry Points'
          }
          # Contracts darf nichts anderes referenzieren
          $contractsProj = Get-Content src/RomCleanup.Contracts/RomCleanup.Contracts.csproj -Raw
          if ($contractsProj -match 'RomCleanup\.Core|RomCleanup\.Infrastructure|RomCleanup\.CLI|RomCleanup\.Api|RomCleanup\.UI\.Wpf') {
            throw 'Contracts project must not reference any other project'
          }
          Write-Host 'Dependency direction OK'
