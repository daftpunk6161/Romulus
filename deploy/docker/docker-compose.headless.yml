services:
  romulus-api:
    build:
      context: ../..
      dockerfile: deploy/docker/api/Dockerfile
    image: romulus:local
    restart: unless-stopped
    environment:
      ROM_CLEANUP_API_KEY: ${ROMULUS_API_KEY:?set ROMULUS_API_KEY}
      AllowRemoteClients: "true"
      PublicBaseUrl: ${ROMULUS_PUBLIC_BASE_URL:?set ROMULUS_PUBLIC_BASE_URL}
      BindAddress: "0.0.0.0"
      Port: "7878"
      DashboardEnabled: "true"
      AllowedRoots__0: "/srv/romulus/roms"
      AllowedRoots__1: "/srv/romulus/exports"
      TrustForwardedFor: "false"
      RateLimitRequests: "120"
      RateLimitWindowSeconds: "60"
      SseTimeoutSeconds: "300"
      SseHeartbeatSeconds: "15"
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - romulus_index:/app/.romulus
      - romulus_profiles:/root/.config/Romulus
      - type: bind
        source: /srv/romulus/roms
        target: /srv/romulus/roms
        read_only: true
      - type: bind
        source: /srv/romulus/exports
        target: /srv/romulus/exports
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "dotnet", "api/Romulus.Api.dll", "--urls", "http://localhost:7878", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # One-shot CLI runner. Usage:
  #   docker compose -f docker-compose.headless.yml run --rm romulus-cli health --console snes
  #   docker compose -f docker-compose.headless.yml run --rm romulus-cli enrich --console snes
  romulus-cli:
    image: romulus:local
    profiles: ["cli"]
    entrypoint: ["dotnet", "cli/romulus.dll"]
    volumes:
      - romulus_index:/app/.romulus
      - romulus_profiles:/root/.config/Romulus
      - type: bind
        source: /srv/romulus/roms
        target: /srv/romulus/roms
      - type: bind
        source: /srv/romulus/exports
        target: /srv/romulus/exports
    read_only: true
    tmpfs:
      - /tmp

volumes:
  romulus_index:
  romulus_profiles:
